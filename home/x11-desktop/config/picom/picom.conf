# Picom config (rounded corners + per-app transparency).
# Keep it lightweight; adjust effects later.

backend = "glx";
vsync = true;

# Rounded corners
corner-radius = 12;
round-borders = 1;

rounded-corners-exclude = [
  # Don’t round bars/menus/notifications.
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'notification'",
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'tooltip'",
  # Eww bar windows
  "class_g = 'eww'"
];

# No shadows/fading (MVP). You can enable these later.
shadow = false;
fading = false;

# Opacity
# Make *unfocused* windows slightly transparent ("dimming" effect).
# Keep focused windows fully opaque.
active-opacity = 1.0;
inactive-opacity = 0.82;
frame-opacity = 1.0;

# Force the inactive opacity even if an application sets its own opacity.
# NOTE: This can override per-app rules on some setups, so keep it off and rely on
# `inactive-opacity-exclude` + `opacity-rule` for the apps that must stay opaque.
inactive-opacity-override = false;

# Keep specific apps and UI elements fully opaque even when unfocused.
# Notes:
# - Your bar/panel must remain opaque.
# - Browsers and the launcher (rofi) should never be transparent.
# - Use `*=` (substring match) because WM_CLASS can vary across packages.
inactive-opacity-exclude = [
  # Bars/panels
  "window_type = 'dock'",
  "class_g = 'eww'",

  # Never dim browsers / launcher
  # Match both WM_CLASS parts (class_g=instance, class_i=class) because they vary.
  "class_g *= 'firefox'",
  "class_i *= 'firefox'",
  "class_g *= 'Firefox'",
  "class_i *= 'Firefox'",
  "class_g *= 'Navigator'",
  "class_i *= 'Navigator'",

  "class_g *= 'qutebrowser'",
  "class_i *= 'qutebrowser'",

  "class_g *= 'Brave'",
  "class_i *= 'Brave'",
  "class_g *= 'brave'",
  "class_i *= 'brave'",

  "class_g *= 'Rofi'",
  "class_i *= 'Rofi'",
  "class_g *= 'rofi'",
  "class_i *= 'rofi'",

  # Don’t fade transient UI
  "window_type = 'desktop'",
  "window_type = 'notification'",
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'tooltip'"
];

# Additionally force these apps to full opacity even if they set their own.
opacity-rule = [
  "100:class_g *= 'firefox'",
  "100:class_g *= 'Firefox'",
  "100:class_g *= 'qutebrowser'",
  "100:class_g *= 'Brave'",
  "100:class_g *= 'brave'",
  "100:class_g *= 'Rofi'",
  "100:class_g *= 'rofi'"
];

